name: TrailGuard
options:
  bundleIdPrefix: com.trailguard
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "F945V6582K"
targets:
  TrailGuard:
    type: application
    platform: iOS
    sources:
      - TrailGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trailguard.app
        INFOPLIST_FILE: TrailGuard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: TrailGuard/TrailGuard-Bridging-Header.h
        # Critical Alerts entitlement — allows SOS to bypass silent mode / DND.
        # Requires Apple approval before it works in production.
        # Submit request at: https://developer.apple.com/contact/request/notifications-critical-alerts-entitlement/
        CODE_SIGN_ENTITLEMENTS: TrailGuard/TrailGuard.entitlements
