name: TrailGuard
options:
  bundleIdPrefix: com.trailguard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.9.0
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0

targets:
  TrailGuard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources/TrailGuard
    resources:
      - path: Sources/TrailGuard/PrivacyInfo.xcprivacy
    info:
      path: Sources/TrailGuard/Info.plist
      properties:
        CFBundleDisplayName: TrailGuard
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: ""
        NSLocationAlwaysAndWhenInUseUsageDescription: TrailGuard uses your location for crash detection, ride tracking, and sharing your position with your group.
        NSLocationWhenInUseUsageDescription: TrailGuard needs location access to track your ride and detect crashes.
        NSMotionUsageDescription: TrailGuard uses motion sensors to detect crashes and impacts on the trail.
        UIBackgroundModes:
          - location
          - fetch
          - remote-notification
          - processing
    entitlements:
      path: Sources/TrailGuard/TrailGuard.entitlements
      properties:
        com.apple.developer.location.push: true
        aps-environment: development
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.trailguard.app
      SWIFT_VERSION: "5.9"
      DEVELOPMENT_TEAM: F945V6582K
      CODE_SIGN_STYLE: Automatic
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: ComposableArchitecture
      - package: Supabase

  TrailGuardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Tests/TrailGuardTests
    dependencies:
      - target: TrailGuard
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.trailguard.app.tests

schemes:
  TrailGuard:
    build:
      targets:
        TrailGuard: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TrailGuardTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
